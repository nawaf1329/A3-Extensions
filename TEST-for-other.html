<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>A3 Directory</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4FMC0Z3BFP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-4FMC0Z3BFP');
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:              #030a05;
      --glass:           rgba(255,255,255,0.03);
      --glass-hover:     rgba(255,255,255,0.06);
      --glass-border:    rgba(255,255,255,0.08);
      --glass-border-h:  rgba(255,255,255,0.15);

      --gold:            #d4a843;
      --gold-dim:        rgba(212,168,67,0.12);
      --gold-border:     rgba(212,168,67,0.3);
      --gold-glow:       rgba(212,168,67,0.4);

      --emerald:         #34d399;
      --emerald-dim:     rgba(52,211,153,0.08);
      --emerald-border:  rgba(52,211,153,0.2);

      --red:             #fb7185;
      --red-dim:         rgba(251,113,133,0.1);
      --red-border:      rgba(251,113,133,0.25);
      --red-glow:        rgba(251,113,133,0.3);

      --amber:           #fbbf24;
      --amber-dim:       rgba(251,191,36,0.08);
      --amber-border:    rgba(251,191,36,0.2);

      --text:            #eef5f0;
      --text2:           rgba(200,230,210,0.5);
      --text3:           rgba(200,230,210,0.3);
    }

    html, body {
      width: 100%; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }

    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(120px); opacity: 0.3;
    }

    .b1 {
      width: 800px; height: 800px;
      background: radial-gradient(circle, #064e35 0%, transparent 70%);
      top: -300px; left: -200px;
    }
    .b2 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #78350f 0%, transparent 70%);
      top: -100px; right: -100px; opacity: 0.25;
    }
    .b3 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #065f46 0%, transparent 70%);
      bottom: -200px; right: 20%;
    }
    .b4 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #92400e 0%, transparent 70%);
      bottom: 0; left: 10%; opacity: 0.2;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: relative; z-index: 10;
      flex-shrink: 0;
      padding: 10px 24px;
      background: rgba(3,10,5,0.75);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex; align-items: center; gap: 11px;
    }

    .logo-box {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 10px;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 18px rgba(212,168,67,0.15);
    }
    .logo-box img { width: 100%; height: 100%; object-fit: contain; }

    .brand-text h1 {
      font-size: 0.85rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text); white-space: nowrap;
    }
    .brand-text p { font-size: 0.62rem; color: var(--text2); margin-top: 1px; }

    /* RRT */
    .rrt-badge {
      display: flex; align-items: center; gap: 12px;
      background: var(--red-dim);
      border: 1px solid var(--red-border);
      padding: 5px 14px; border-radius: 99px;
      white-space: nowrap;
      box-shadow: 0 0 16px rgba(251,113,133,0.08);
    }

    .pulse {
      width: 7px; height: 7px; border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%   { background:#ef4444; box-shadow:0 0 8px #ef4444; }
      50%  { background:#d4a843; box-shadow:0 0 8px #d4a843; }
      100% { background:#ef4444; box-shadow:0 0 8px #ef4444; }
    }

    .rrt-item { font-size: 0.75rem; color: var(--text2); display:flex; align-items:center; gap:5px; }
    .rrt-num  { font-weight:800; color:var(--red); font-variant-numeric:tabular-nums; text-shadow:0 0 8px var(--red-glow); }

    /* Topbar controls */
    .top-controls { display:flex; align-items:center; gap:6px; }

    .ctrl-btn {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text2); padding: 5px 11px;
      font-size: 0.73rem; font-weight: 600;
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      transition: all 0.15s; white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .ctrl-btn:hover { color:var(--text); border-color:var(--glass-border-h); background:var(--glass-hover); }
    .ctrl-btn.active { background:var(--gold-dim); border-color:var(--gold-border); color:var(--gold); }

    .divider { width:1px; height:22px; background:var(--glass-border); flex-shrink:0; }

    /* ── SEARCH HERO ── */
    .search-hero {
      position: relative; z-index: 10;
      flex-shrink: 0;
      padding: 16px 24px 14px;
      background: rgba(3,10,5,0.5);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
    }

    .search-wrap {
      position: relative;
      max-width: 680px;
      margin: 0 auto;
    }

    .search-icon-el {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--gold); opacity: 0.7;
      pointer-events: none;
      font-size: 16px;
    }

    #search {
      width: 100%;
      padding: 13px 44px 13px 46px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      border: 1.5px solid rgba(212,168,67,0.2);
      border-radius: 14px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
      letter-spacing: 0.01em;
    }

    #search:focus {
      border-color: rgba(212,168,67,0.5);
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 0 3px rgba(212,168,67,0.1), 0 8px 32px rgba(0,0,0,0.3);
    }

    #search::placeholder { color: var(--text2); }

    .clear-btn {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--glass-border);
      color: var(--text2); cursor: pointer;
      width: 22px; height: 22px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      font-size: 10px; transition: all 0.15s;
    }
    .clear-btn.show { display:flex; }
    .clear-btn:hover { color:var(--text); background:rgba(255,255,255,0.12); }

    .search-meta {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin-top: 9px;
      flex-wrap: wrap;
    }

    .search-hint {
      font-size: 0.68rem; color: var(--text3);
      display: flex; align-items: center; gap: 5px;
    }

    .search-hint span {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      border-radius: 4px; padding: 1px 6px;
      font-size: 0.65rem; color: var(--text2);
    }

    /* ── MAIN ── */
    .main {
      flex: 1; overflow-y: auto;
      padding: 14px 24px 24px;
      position: relative; z-index: 1;
      scrollbar-width: thin;
      scrollbar-color: rgba(212,168,67,0.2) transparent;
    }
    .main::-webkit-scrollbar { width: 4px; }
    .main::-webkit-scrollbar-thumb { background: rgba(212,168,67,0.2); border-radius:10px; }

    /* Emergency bar */
    .emergency-bar {
      background: var(--red-dim);
      border: 1px solid var(--red-border);
      border-radius: 12px; padding: 9px 14px;
      margin-bottom: 12px;
      display: flex; flex-wrap: wrap; gap: 7px; align-items: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 20px rgba(251,113,133,0.05), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .emg-label {
      color: var(--red); font-size: 0.67rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      white-space: nowrap; margin-right: 2px;
    }

    .e-pill {
      background: rgba(251,113,133,0.07);
      border: 1px solid var(--red-border);
      border-radius: 7px; padding: 4px 10px;
      display: flex; align-items: center; gap: 7px;
      cursor: pointer; transition: all 0.15s;
    }
    .e-pill:hover { background: rgba(251,113,133,0.14); border-color:rgba(251,113,133,0.4); }
    .e-pill .en  { font-size:0.74rem; color:var(--text); }
    .e-pill .ee  { font-size:0.82rem; font-weight:800; color:var(--red); font-variant-numeric:tabular-nums; text-shadow:0 0 8px var(--red-glow); }

    /* Category pills */
    .cat-row {
      overflow-x: auto; display:flex; gap:6px;
      padding-bottom: 2px; margin-bottom: 12px;
      scrollbar-width: none;
    }
    .cat-row::-webkit-scrollbar { display:none; }

    .cat-pill {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 5px 14px;
      font-size: 0.71rem; white-space: nowrap;
      cursor: pointer; color: var(--text2);
      transition: all 0.15s; user-select: none; flex-shrink: 0;
      backdrop-filter: blur(8px);
    }
    .cat-pill:hover { border-color:var(--gold-border); color:var(--text); background:var(--gold-dim); }
    .cat-pill.active {
      background: var(--gold-dim);
      border-color: var(--gold-border);
      color: var(--gold); font-weight: 600;
      box-shadow: 0 0 12px rgba(212,168,67,0.1);
    }

    /* Results meta */
    .results-info { font-size: 0.71rem; color: var(--text2); margin-bottom: 9px; min-height: 16px; }

    /* Section header */
    .sec-hdr {
      font-size: 0.66rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text3); margin: 18px 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex; justify-content: space-between; align-items: center;
    }
    .sec-hdr .cnt {
      font-weight: 400; text-transform: none; letter-spacing: 0;
      font-size: 0.66rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 10px; padding: 1px 8px;
    }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap: 8px; }

    /* ── CARD ── */
    .card {
      background: var(--glass);
      backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      border-radius: 13px;
      padding: 12px 14px 12px 18px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; cursor: pointer; user-select: none;
      transition: all 0.2s;
      position: relative; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    /* gold left accent line */
    .card::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 2.5px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover {
      background: var(--glass-hover);
      border-color: rgba(212,168,67,0.25);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.3), 0 0 0 1px rgba(212,168,67,0.08);
    }
    .card:hover::before { opacity: 1; }
    .card:active { transform: scale(0.99) translateY(0); }

    .card.is-emg {
      border-color: var(--red-border);
      background: rgba(251,113,133,0.04);
    }
    .card.is-emg::before { background: linear-gradient(to bottom, transparent, var(--red), transparent); }
    .card.is-emg:hover { border-color: rgba(251,113,133,0.4); background: rgba(251,113,133,0.07); }
    .card.is-emg:hover::before { opacity: 1; }

    .card.is-stat {
      border-color: var(--amber-border);
      background: var(--amber-dim);
    }
    .card.is-stat::before { background: linear-gradient(to bottom, transparent, var(--amber), transparent); }
    .card.is-stat:hover { border-color: rgba(251,191,36,0.35); }
    .card.is-stat:hover::before { opacity: 1; }

    .card-left { flex: 1; min-width: 0; }

    .card-service {
      font-size: 0.85rem; font-weight: 600; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin-bottom: 4px;
    }

    .card-cat {
      font-size: 0.67rem; color: var(--text2);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .card-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }

    /* Extension badge */
    .ext-badge {
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 1.05rem; font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--gold);
      white-space: nowrap;
      text-shadow: 0 0 14px var(--gold-glow);
      letter-spacing: 0.02em;
      transition: all 0.15s;
    }

    .card:hover .ext-badge {
      background: rgba(212,168,67,0.18);
      box-shadow: 0 0 14px rgba(212,168,67,0.15);
    }

    .card.is-emg .ext-badge {
      background: var(--red-dim);
      border-color: var(--red-border);
      color: var(--red);
      text-shadow: 0 0 12px var(--red-glow);
    }

    .card.is-stat .ext-badge {
      background: rgba(251,191,36,0.1);
      border-color: rgba(251,191,36,0.25);
      color: var(--amber);
      text-shadow: 0 0 12px rgba(251,191,36,0.35);
    }

    .fav-btn {
      background:none; border:none; color: rgba(255,255,255,0.18);
      cursor:pointer; font-size:0.88rem; padding:0; line-height:1;
      transition: all 0.15s;
    }
    .fav-btn:hover { transform:scale(1.2); color:rgba(255,255,255,0.45); }
    .fav-btn.active { color:var(--gold); text-shadow:0 0 10px rgba(212,168,67,0.6); }

    mark {
      background: rgba(212,168,67,0.2);
      color: var(--text); border-radius: 2px; padding: 0 1px;
    }
    .card.is-emg mark  { background: rgba(251,113,133,0.2); }
    .card.is-stat mark { background: rgba(251,191,36,0.2); }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 10;
      flex-shrink: 0; padding: 7px 24px;
      border-top: 1px solid var(--glass-border);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.68rem; color: var(--text2);
      background: rgba(3,10,5,0.8);
      backdrop-filter: blur(20px);
    }

    .live-wrap { display:flex; align-items:center; gap:6px; }
    .live-dot {
      width:7px; height:7px; border-radius:50%;
      background: var(--emerald);
      box-shadow: 0 0 8px rgba(52,211,153,0.6);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(5,15,8,0.92);
      backdrop-filter: blur(20px);
      border: 1px solid var(--gold-border);
      border-radius: 10px; padding: 9px 18px;
      font-size: 0.8rem; color: var(--text);
      pointer-events: none; opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999; white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,168,67,0.1);
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── EMPTY / LOADING ── */
    .empty { text-align:center; padding:50px 20px; color:var(--text2); }
    .empty-icon { font-size:2.2rem; margin-bottom:12px; opacity:0.6; }
    .empty p { font-size:0.85rem; }
    .empty .sub { margin-top:6px; font-size:0.76rem; color:var(--text3); }

    .loading { text-align:center; padding:60px 20px; color:var(--text2); }
    .spinner {
      width:28px; height:28px; margin:0 auto 14px;
      border: 2px solid rgba(212,168,67,0.15);
      border-top-color: var(--gold);
      border-radius:50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── PRINTER OVERLAY ── */
    .p-overlay {
      position:fixed; inset:0;
      background: rgba(2,7,3,0.88);
      backdrop-filter: blur(22px);
      display:none; align-items:center; justify-content:center;
      z-index:80;
    }

    .p-card {
      width: min(860px,90vw); height: min(520px,80vh);
      background: rgba(5,14,7,0.95);
      backdrop-filter: blur(30px);
      border-radius: 18px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
      display:flex; flex-direction:column; overflow:hidden;
    }

    .p-header {
      padding: 13px 18px; border-bottom: 1px solid var(--glass-border);
      display:flex; align-items:center; justify-content:space-between;
      background: rgba(212,168,67,0.04);
    }

    .p-title { font-size:0.88rem; font-weight:600; display:flex; align-items:center; gap:7px; color:var(--text); }

    .p-close {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      color: var(--text2); border-radius:99px;
      padding:3px 12px; font-size:0.75rem; cursor:pointer;
      transition:all 0.15s;
    }
    .p-close:hover { color:var(--text); background:rgba(255,255,255,0.08); }

    .p-body { flex:1; overflow-y:auto; }

    .p-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
    .p-table thead th {
      position:sticky; top:0;
      background: rgba(3,10,5,0.9);
      backdrop-filter: blur(10px);
      padding:10px 16px;
      border-bottom: 1px solid var(--glass-border);
      color:var(--text2); text-align:left;
      font-size:0.7rem; text-transform:uppercase; letter-spacing:0.09em;
    }
    .p-table tbody td { padding:10px 16px; border-bottom:1px solid rgba(255,255,255,0.03); }
    .p-table tbody tr:hover { background:rgba(255,255,255,0.02); }
    .p-ext {
      font-family:monospace; font-weight:700; font-size:0.85rem;
      color:var(--gold);
      background: var(--gold-dim);
      padding:3px 8px; border-radius:6px;
      border: 1px solid var(--gold-border);
      display:inline-block;
      text-shadow: 0 0 8px rgba(212,168,67,0.3);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .topbar { flex-wrap:wrap; justify-content:center; gap:10px; padding:10px 14px; }
      .brand  { width:100%; justify-content:center; }
      .top-controls { flex-wrap:wrap; justify-content:center; }
      #search { font-size:0.9rem; }
      .grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<!-- Background blobs -->
<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
</div>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <div class="brand">
    <div class="logo-box"><img src="logo.png" alt="A3"></div>
    <div class="brand-text">
      <h1>A3 Internal Extensions</h1>
      <p>King Faisal Specialist Hospital · Created by F1520110 — Nawaf Alshammari</p>
    </div>
  </div>

  <div class="rrt-badge">
    <div class="pulse"></div>
    <div class="rrt-item">RRT Adult <span class="rrt-num">49337</span></div>
    <div class="rrt-item" style="border-left:1px solid rgba(255,255,255,0.08);padding-left:11px;">
      Pediatric <span class="rrt-num">45381</span>
    </div>
  </div>

  <div class="top-controls">
    <button id="btnAll" class="ctrl-btn active" onclick="setView('all',this)">All</button>
    <button id="btnFav" class="ctrl-btn"        onclick="setView('fav',this)">⭐ Favorites</button>
    <div class="divider"></div>
    <button class="ctrl-btn" onclick="resize(-1)">A-</button>
    <button class="ctrl-btn" onclick="resize(1)">A+</button>
    <div class="divider"></div>
    <button class="ctrl-btn" onclick="openPrinter()">🖨️ Printer</button>
  </div>
</div>

<!-- ── SEARCH HERO ── -->
<div class="search-hero">
  <div class="search-wrap">
    <span class="search-icon-el">🔍</span>
    <input type="text" id="search"
      placeholder="Search by name, department, or extension number…"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
  <div class="search-meta">
    <span class="search-hint">Try: <span>Pharmacy</span> <span>Blood Bank</span> <span>CT</span> <span>2222</span></span>
  </div>
</div>

<!-- ── MAIN ── -->
<div class="main">
  <div class="emergency-bar" id="emergencyBar"></div>
  <div class="cat-row" id="catRow"></div>
  <div class="results-info" id="resultsInfo"></div>
  <div id="results">
    <div class="loading"><div class="spinner"></div><p>Loading directory…</p></div>
  </div>
</div>

<!-- ── FOOTER ── -->
<footer>
  <span>Personal initiative — not an official hospital system.</span>
  <div class="live-wrap">
    LIVE <div class="live-dot" id="liveDot" style="opacity:0.3"></div>
  </div>
</footer>

<div class="toast" id="toast"></div>

<!-- ── PRINTER ── -->
<div id="pOverlay" class="p-overlay">
  <div class="p-card">
    <div class="p-header">
      <div class="p-title">🖨️ Printers — Device / Name</div>
      <button class="p-close" onclick="closePrinter()">✕ Close</button>
    </div>
    <div class="p-body">
      <table class="p-table">
        <thead><tr><th>Device</th><th>Name</th></tr></thead>
        <tbody id="pTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const STORAGE_DATA = 'a3_data_v4';
const STORAGE_FAV  = 'a3_fav_v4';
const STORAGE_SIZE = 'a3_size_v4';
const SHEETS_URL   = 'https://script.google.com/macros/s/AKfycby9t71TVzAJyzRDczYYtLh7oIIq9J4jEvyddy7Bc-BAunFMTuYEwerlscLHjfKw0orA/exec';

const EMG_KEYS  = ['Code Team','RRT Adult','RRT Pediatric','Security','Ambulance'];
const PRINTERS  = [
  { device:'RINPA0301B', name:'Label Printer A' },
  { device:'RNURB0202B', name:'Label Printer B' },
  { device:'RNURA0301Z', name:'Printer (A3)'    },
  { device:'nurse_a3',   name:'A3 PC Login'     },
  { device:'KFSH#3709',  name:'PC Password'     }
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let ENTRIES = [], ALL_CATS = [];
let favorites = new Set();
let activeCat = null, currentView = 'all';
let baseSize = 14, toastTimer = null;

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  const s = localStorage.getItem(STORAGE_SIZE);
  if (s) { baseSize = parseInt(s); applySize(); }
  try { const f = localStorage.getItem(STORAGE_FAV); if (f) favorites = new Set(JSON.parse(f)); } catch(e) {}
  try { const d = localStorage.getItem(STORAGE_DATA); if (d) { processData(JSON.parse(d)); render(); } } catch(e) {}
  fetchSheets();
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
function fetchSheets() {
  document.getElementById('liveDot').style.opacity = '0.3';
  const s = document.createElement('script');
  s.src = SHEETS_URL;
  s.onerror = () => { document.getElementById('liveDot').style.opacity = '0.15'; };
  document.body.appendChild(s);
}

function callback(response) {
  document.getElementById('liveDot').style.opacity = '1';
  const prev = localStorage.getItem(STORAGE_DATA);
  const next = JSON.stringify(response);
  if (prev !== next || ENTRIES.length === 0) {
    localStorage.setItem(STORAGE_DATA, next);
    processData(response);
    render();
  }
}

// ── PROCESS ───────────────────────────────────────────────────────────────────
function processData(rows) {
  ENTRIES = rows.map(r => {
    const cat = String(r.category||'').trim();
    const svc = String(r.service||'').trim();
    const ext = String(r.extension||'').trim();
    return { cat, svc, ext, searchText:[cat,svc,ext].join(' ').toLowerCase(), key:`${cat}|${svc}|${ext}` };
  });
  const prio = ['EMERGENCY & SUPPORT','EMERGENCY / SUPPORT (HOSPITAL WIDE)',
    'STAT NUMBERS','STAT','SSCU & CRITICAL CARE','CRITICAL CARE',
    'OR, HOLDING & CAPACITY','OR & HOLDING'];
  const seen = new Set(); ALL_CATS = [];
  prio.forEach(p => {
    const m = ENTRIES.find(e => e.cat.toUpperCase()===p.toUpperCase());
    if (m && !seen.has(m.cat)) { seen.add(m.cat); ALL_CATS.push(m.cat); }
  });
  ENTRIES.forEach(e => { if (!seen.has(e.cat)) { seen.add(e.cat); ALL_CATS.push(e.cat); } });
  buildEmgBar();
  buildCatRow();
}

// ── EMERGENCY BAR ─────────────────────────────────────────────────────────────
function buildEmgBar() {
  const bar = document.getElementById('emergencyBar');
  const seen = new Set();
  const pills = ENTRIES.filter(e => {
    if (!e.cat.toLowerCase().includes('emergency')) return false;
    if (seen.has(e.svc)) return false;
    seen.add(e.svc);
    return EMG_KEYS.some(k => e.svc.toLowerCase().includes(k.toLowerCase()));
  });
  if (!pills.length) { bar.style.display='none'; return; }
  bar.style.display='flex';
  bar.innerHTML = '<span class="emg-label">🚨 Critical</span>' +
    pills.map(e =>
      `<div class="e-pill" onclick="copyExt('${esc(e.ext)}','${esc(e.svc)}')">
        <span class="en">${escHtml(e.svc)}</span>
        <span class="ee">${escHtml(e.ext)}</span>
      </div>`).join('');
}

// ── CATEGORY ROW ──────────────────────────────────────────────────────────────
function buildCatRow() {
  document.getElementById('catRow').innerHTML =
    `<button class="cat-pill active" onclick="filterCat(null,this)">All</button>` +
    ALL_CATS.map(c =>
      `<button class="cat-pill" onclick="filterCat('${esc(c)}',this)">${escHtml(c)}</button>`
    ).join('');
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const el    = document.getElementById('results');
  const info  = document.getElementById('resultsInfo');
  const query = document.getElementById('search').value.trim();

  let pool = currentView==='fav' ? ENTRIES.filter(e=>favorites.has(e.key)) : ENTRIES;
  if (activeCat) pool = pool.filter(e=>e.cat===activeCat);

  if (!query) {
    info.textContent = activeCat ? `${pool.length} entries in ${activeCat}` : `${ENTRIES.length} total entries`;
    const cats = activeCat ? [activeCat] : ALL_CATS;
    const html = cats.map(cat => {
      const items = pool.filter(e=>e.cat===cat);
      if (!items.length) return '';
      return `<div class="sec-hdr">${escHtml(cat)}<span class="cnt">${items.length}</span></div>
        <div class="grid">${items.map(e=>card(e,'')).join('')}</div>`;
    }).join('');
    el.innerHTML = html || `<div class="empty"><div class="empty-icon">⭐</div>
      <p>No favorites yet</p><p class="sub">Star any entry to save it here</p></div>`;
    return;
  }

  const tokens = query.toLowerCase().split(/\s+/).filter(Boolean);
  let res = pool.filter(e=>tokens.every(t=>e.searchText.includes(t)));
  res.sort((a,b) => scoreOf(b,query.toLowerCase()) - scoreOf(a,query.toLowerCase()));

  info.textContent = res.length ? `${res.length} result${res.length!==1?'s':''} for "${query}"` : '';

  el.innerHTML = res.length
    ? `<div class="grid">${res.map(e=>card(e,query)).join('')}</div>`
    : `<div class="empty"><div class="empty-icon">🔍</div>
       <p>No results for <strong>"${escHtml(query)}"</strong></p>
       <p class="sub">Try a department name, staff name, or extension</p></div>`;
}

function scoreOf(e,q) {
  if (e.ext===q) return 100;
  if (e.ext.startsWith(q)) return 80;
  if (e.svc.toLowerCase()===q) return 70;
  if (e.svc.toLowerCase().startsWith(q)) return 60;
  if (e.svc.toLowerCase().includes(q)) return 40;
  return 10;
}

// ── CARD ──────────────────────────────────────────────────────────────────────
function card(e, query) {
  const isFav = favorites.has(e.key);
  const isEmg = e.cat.toLowerCase().includes('emergency');
  const isStat= e.cat.toLowerCase().includes('stat');
  let cls='card';
  if (isEmg) cls+=' is-emg'; else if (isStat) cls+=' is-stat';

  const svc = query ? hl(escHtml(e.svc),query) : escHtml(e.svc);
  const cat = query ? hl(escHtml(e.cat),query) : escHtml(e.cat);
  const ext = query ? hl(escHtml(e.ext),query) : escHtml(e.ext);

  return `<div class="${cls}" onclick="copyExt('${esc(e.ext)}','${esc(e.svc)}')">
    <div class="card-left">
      <div class="card-service">${svc}</div>
      <div class="card-cat">${cat}</div>
    </div>
    <div class="card-right">
      <div class="ext-badge">${ext}</div>
      <button class="fav-btn ${isFav?'active':''}"
        onclick="event.stopPropagation();toggleFav('${esc(e.key)}')"
        title="${isFav?'Remove':'Add to favorites'}">★</button>
    </div>
  </div>`;
}

// ── FAVORITES ─────────────────────────────────────────────────────────────────
function toggleFav(key) {
  favorites.has(key) ? favorites.delete(key) : favorites.add(key);
  localStorage.setItem(STORAGE_FAV, JSON.stringify([...favorites]));
  render();
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
function filterCat(cat,btn) {
  activeCat=cat;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); render();
}
function setView(v,btn) {
  currentView=v;
  document.querySelectorAll('.ctrl-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function clearSearch() {
  const s=document.getElementById('search'); s.value=''; s.focus();
  document.getElementById('clearBtn').classList.remove('show'); render();
}
function resize(d) { baseSize=Math.max(12,Math.min(24,baseSize+d)); applySize(); localStorage.setItem(STORAGE_SIZE,baseSize); }
function applySize() { document.documentElement.style.fontSize=baseSize+'px'; }

// ── PRINTER ───────────────────────────────────────────────────────────────────
function openPrinter() {
  document.getElementById('pTbody').innerHTML = PRINTERS.map(p=>
    `<tr><td><span class="p-ext">${escHtml(p.device)}</span></td><td>${escHtml(p.name)}</td></tr>`
  ).join('');
  document.getElementById('pOverlay').style.display='flex';
}
function closePrinter() { document.getElementById('pOverlay').style.display='none'; }

// ── COPY ─────────────────────────────────────────────────────────────────────
function copyExt(ext,name) {
  const done=()=>showToast(`✓ Copied ${ext} — ${name}`);
  if (navigator.clipboard) navigator.clipboard.writeText(ext).then(done);
  else { const t=document.createElement('textarea'); t.value=ext; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); done(); }
}
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2100);
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function hl(text,q) {
  let r=text;
  q.toLowerCase().split(/\s+/).filter(Boolean).forEach(t=>{
    r=r.replace(new RegExp(`(${escRe(t)})`,'gi'),'<mark>$1</mark>');
  });
  return r;
}
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function esc(s){ return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input',function(){
  document.getElementById('clearBtn').classList.toggle('show',this.value.length>0);
  render();
});

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>

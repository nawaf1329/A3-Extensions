<style>
/* ========================================================
   A3 DIRECTORY — MOBILE / PHONE BUILD
   ======================================================== */

:root {
  --bg-base: #020617;
  --bg-gradient: radial-gradient(ellipse at top, #0c1426 0%, #020617 55%);

  --surface: #0f172a;
  --surface-elevated: #1e293b;
  --surface-hover: #334155;
  --border: rgba(148, 163, 184, 0.13);
  --border-strong: rgba(148, 163, 184, 0.25);

  --primary: #38bdf8;
  --primary-strong: #0ea5e9;
  --primary-soft: rgba(56, 189, 248, 0.12);
  --primary-line: rgba(56, 189, 248, 0.32);

  --danger: #f43f5e;
  --danger-soft: rgba(244, 63, 94, 0.12);
  --danger-line: rgba(244, 63, 94, 0.38);

  --warning: #fbbf24;
  --success: #34d399;

  --text-1: #f8fafc;
  --text-2: #cbd5e1;
  --text-3: #94a3b8;
  --text-4: #64748b;

  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 22px;

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);

  --font-display: 'Geist', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  --base-size: 15px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  font-family: var(--font-display);
  font-size: var(--base-size);
  color: var(--text-1);
  background: var(--bg-base);
  background-image: var(--bg-gradient);
  background-attachment: fixed;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overscroll-behavior: none;
}

body {
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top);
}

button { font-family: inherit; cursor: pointer; border: none; background: none; }
input { font-family: inherit; }
a { text-decoration: none; color: inherit; }

/* ========== HEADER ========== */
.app-header {
  flex-shrink: 0;
  padding: 0.85rem 1rem 0.7rem;
  background: rgba(2, 6, 23, 0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  z-index: 30;
  position: relative;
}

.brand-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.logo-mark {
  width: 42px; height: 42px;
  flex-shrink: 0;
  border-radius: 11px;
  background: radial-gradient(circle at 30% 20%, #1e293b 0%, #0b1220 70%);
  border: 1px solid var(--primary-line);
  box-shadow: 0 0 14px rgba(56, 189, 248, 0.2),
              inset 0 1px 0 rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.logo-mark img { width: 170%; height: 170%; object-fit: contain; }
.logo-mark .logo-fallback {
  font-family: var(--font-mono);
  font-weight: 800;
  color: var(--primary);
  font-size: 1rem;
  letter-spacing: 0.05em;
}

.brand-text { flex: 1; min-width: 0; }
.brand-text h1 {
  margin: 0;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #fff;
  line-height: 1.1;
}
.brand-text p {
  margin: 3px 0 0;
  font-size: 0.7rem;
  color: var(--text-3);
  letter-spacing: 0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.icon-button {
  width: 40px; height: 40px;
  border-radius: 11px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.05rem;
  transition: transform 0.12s, background 0.15s;
  flex-shrink: 0;
}
.icon-button:active {
  background: var(--surface-elevated);
  transform: scale(0.92);
}

/* ========== RRT EMERGENCY BANNER ========== */
.rrt-bar {
  flex-shrink: 0;
  padding: 0.55rem 1rem;
  background: linear-gradient(90deg,
              rgba(244,63,94,0.05),
              rgba(244,63,94,0.13) 50%,
              rgba(244,63,94,0.05));
  border-bottom: 1px solid var(--danger-line);
  display: flex;
  align-items: center;
  gap: 0.55rem;
}

.rrt-pulse {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--danger);
  animation: rrtPulse 1.7s infinite;
  flex-shrink: 0;
}
@keyframes rrtPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(244,63,94,0.55); background: #ef4444; }
  50%      { box-shadow: 0 0 0 7px rgba(244,63,94,0); background: #3b82f6; }
}

.rrt-label {
  font-size: 0.64rem;
  font-weight: 800;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--danger);
}

.rrt-numbers {
  display: flex;
  gap: 0.4rem;
  flex: 1;
  justify-content: flex-end;
}

.rrt-call {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.32rem 0.6rem;
  background: rgba(244,63,94,0.16);
  border: 1px solid var(--danger-line);
  border-radius: 9px;
  transition: transform 0.12s, background 0.15s;
}
.rrt-call:active {
  transform: scale(0.95);
  background: rgba(244,63,94,0.28);
}
.rrt-call-label {
  font-size: 0.6rem;
  color: var(--text-2);
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.rrt-call-num {
  font-family: var(--font-mono);
  font-size: 0.88rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.02em;
}

/* ========== SEARCH ========== */
.search-wrap {
  flex-shrink: 0;
  padding: 0.7rem 1rem 0.5rem;
  background: rgba(2,6,23,0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.search-field { position: relative; }
.search-field .search-icon {
  position: absolute;
  left: 12px; top: 50%; transform: translateY(-50%);
  width: 17px; height: 17px;
  color: var(--text-4);
  pointer-events: none;
}
.search-field input {
  width: 100%;
  height: 44px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0 40px 0 38px;
  color: var(--text-1);
  font-size: 0.95rem;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-field input::placeholder { color: var(--text-4); }
.search-field input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-soft);
}
.search-clear {
  position: absolute;
  right: 6px; top: 50%; transform: translateY(-50%);
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--surface-elevated);
  color: var(--text-3);
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  font-weight: 700;
}
.search-field.has-text .search-clear { display: flex; }

/* ========== FILTER CHIPS / SORT ========== */
.filter-row {
  display: flex;
  gap: 0.4rem;
  margin-top: 0.55rem;
  align-items: center;
}
.chip {
  height: 34px;
  padding: 0 0.85rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
  color: var(--text-3);
  font-size: 0.83rem;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  transition: transform 0.12s, background 0.15s, color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.chip.active {
  background: var(--primary-soft);
  border-color: var(--primary-line);
  color: var(--primary);
}
.chip:active { transform: scale(0.95); }
.chip-count {
  font-size: 0.7rem;
  background: rgba(148,163,184,0.16);
  padding: 1px 7px;
  border-radius: 99px;
  color: var(--text-3);
  font-weight: 700;
  min-width: 22px;
  text-align: center;
}
.chip.active .chip-count {
  background: rgba(56,189,248,0.22);
  color: var(--primary);
}

.sort-select {
  margin-left: auto;
  height: 34px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
  color: var(--text-2);
  padding: 0 28px 0 0.85rem;
  font-size: 0.82rem;
  font-weight: 600;
  -webkit-appearance: none;
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat: no-repeat;
  background-position: right 8px center;
  background-size: 14px;
}

/* ========== LIST ========== */
.list-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0.3rem 1rem 6rem;
  overscroll-behavior: contain;
}

.section-label {
  font-size: 0.64rem;
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-4);
  padding: 0.85rem 0.2rem 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

.card {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  padding: 0.7rem 0.65rem 0.7rem 0.3rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 0.5rem;
  transition: transform 0.1s, background 0.15s, border-color 0.15s;
}
.card:active {
  background: var(--surface-elevated);
  transform: scale(0.995);
}

.card-fav {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: #475569;
  font-size: 1.25rem;
  transition: color 0.15s, transform 0.15s;
}
.card-fav.active {
  color: var(--warning);
  text-shadow: 0 0 12px rgba(251,191,36,0.5);
}
.card-fav:active { transform: scale(1.2); }

.card-body { flex: 1; min-width: 0; }
.card-service {
  font-size: 0.94rem;
  font-weight: 600;
  color: var(--text-1);
  line-height: 1.3;
  margin-bottom: 0.22rem;
  word-break: break-word;
}
.card-category {
  display: inline-block;
  font-size: 0.66rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-3);
  background: rgba(148,163,184,0.08);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 99px;
}

.card-ext {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0.55rem 0.8rem;
  background: var(--primary-soft);
  border: 1px solid var(--primary-line);
  border-radius: 10px;
  font-family: var(--font-mono);
  font-size: 1rem;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 0.02em;
  min-height: 42px;
  min-width: 70px;
}

/* Empty / Loading */
.empty-state {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text-3);
}
.empty-state .ico {
  font-size: 2.5rem;
  margin-bottom: 0.7rem;
  opacity: 0.4;
}
.empty-state h3 {
  margin: 0 0 0.3rem;
  color: var(--text-2);
  font-size: 1rem;
  font-weight: 600;
}
.empty-state p {
  margin: 0;
  font-size: 0.85rem;
  line-height: 1.4;
}

.skeleton {
  height: 70px;
  background: linear-gradient(90deg, var(--surface) 0%, var(--surface-elevated) 50%, var(--surface) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: var(--radius);
  margin-bottom: 0.5rem;
  border: 1px solid var(--border);
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* ========== STATUS BAR (bottom) ========== */
.status-bar {
  position: fixed;
  left: 0;
  right: 84px;
  bottom: 0;
  padding: 0.5rem 1rem calc(0.5rem + var(--safe-bottom));
  background: linear-gradient(180deg, transparent 0%, rgba(2,6,23,0.92) 55%);
  pointer-events: none;
  z-index: 20;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  gap: 0.45rem;
  font-size: 0.7rem;
  color: var(--text-4);
}
.status-bar > * { pointer-events: auto; }

.live-pill {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.3rem 0.65rem;
  background: rgba(15,23,42,0.85);
  border: 1px solid var(--border);
  border-radius: 99px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text-3);
  transition: transform 0.12s;
}
.live-pill:active { transform: scale(0.94); }

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 7px var(--success);
}
.live-dot.syncing {
  background: var(--warning);
  box-shadow: 0 0 7px var(--warning);
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

.count-pill {
  padding: 0.3rem 0.7rem;
  background: rgba(15,23,42,0.85);
  border: 1px solid var(--border);
  border-radius: 99px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--text-3);
}

/* ========== FAB (Printer) ========== */
.fab {
  position: fixed;
  right: 16px;
  bottom: calc(22px + var(--safe-bottom));
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 1px solid var(--primary-line);
  background: linear-gradient(135deg, #0ea5e9 0%, #075985 100%);
  color: #fff;
  font-size: 1.4rem;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 10px 25px rgba(14,165,233,0.45),
              0 0 0 1px rgba(255,255,255,0.06) inset;
  z-index: 25;
  transition: transform 0.18s;
}
.fab:active { transform: scale(0.9); }

/* ========== BOTTOM SHEET ========== */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(2,6,23,0.7);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  z-index: 80;
}
.sheet-backdrop.open {
  opacity: 1;
  pointer-events: auto;
}

.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: var(--surface);
  border-top: 1px solid var(--border-strong);
  border-radius: 24px 24px 0 0;
  transform: translateY(101%);
  transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 90;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  padding-bottom: var(--safe-bottom);
  box-shadow: 0 -12px 40px rgba(0,0,0,0.55);
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 40px; height: 4px;
  background: var(--text-4);
  border-radius: 99px;
  margin: 0.65rem auto 0.3rem;
  opacity: 0.55;
}
.sheet-header {
  padding: 0.6rem 1.2rem 0.9rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.sheet-title {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-1);
}
.sheet-title .sheet-icon { font-size: 1.15rem; }
.sheet-close {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--surface-elevated);
  color: var(--text-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
  font-weight: 700;
}
.sheet-body {
  overflow-y: auto;
  padding: 0.7rem 1rem 1rem;
  -webkit-overflow-scrolling: touch;
}

.printer-row {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  padding: 0.75rem 0.7rem;
  background: var(--bg-base);
  border: 1px solid var(--border);
  border-radius: 11px;
  margin-bottom: 0.5rem;
}
.printer-code {
  font-family: var(--font-mono);
  font-size: 0.86rem;
  font-weight: 700;
  color: var(--primary);
  background: var(--primary-soft);
  border: 1px solid var(--primary-line);
  padding: 0.4rem 0.6rem;
  border-radius: 8px;
  flex-shrink: 0;
  white-space: nowrap;
}
.printer-name {
  flex: 1;
  font-size: 0.9rem;
  color: var(--text-1);
  font-weight: 500;
  min-width: 0;
  word-break: break-word;
}

/* ========== SETTINGS POPOVER ========== */
.settings-pop {
  position: fixed;
  top: calc(64px + var(--safe-top));
  right: 12px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: 14px;
  padding: 0.75rem;
  box-shadow: 0 24px 50px rgba(0,0,0,0.6);
  z-index: 70;
  opacity: 0;
  transform: scale(0.9) translateY(-6px);
  pointer-events: none;
  transform-origin: top right;
  transition: opacity 0.18s, transform 0.18s;
  min-width: 200px;
  max-width: 260px;
}
.settings-pop.open {
  opacity: 1;
  transform: scale(1) translateY(0);
  pointer-events: auto;
}
.settings-pop h4 {
  margin: 0 0 0.45rem;
  padding: 0 0.25rem;
  font-size: 0.62rem;
  font-weight: 800;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--text-4);
}
.size-row {
  display: flex;
  gap: 0.35rem;
  align-items: center;
  background: var(--bg-base);
  border-radius: 11px;
  padding: 0.3rem;
  border: 1px solid var(--border);
}
.size-row button {
  flex: 1;
  height: 34px;
  border-radius: 8px;
  background: var(--surface-elevated);
  color: var(--text-1);
  font-weight: 700;
  font-size: 0.95rem;
  transition: background 0.12s, color 0.12s;
}
.size-row button:active {
  background: var(--primary-soft);
  color: var(--primary);
}
.size-row .size-val {
  flex: 1.2;
  text-align: center;
  font-size: 0.83rem;
  color: var(--text-2);
  font-weight: 600;
  font-family: var(--font-mono);
}
.about-block {
  margin-top: 0.7rem;
  padding: 0.55rem 0.6rem;
  background: var(--bg-base);
  border: 1px solid var(--border);
  border-radius: 11px;
  font-size: 0.72rem;
  color: var(--text-3);
  line-height: 1.5;
}
.about-block strong {
  color: var(--text-1);
  font-weight: 600;
  display: block;
  margin-bottom: 2px;
  font-size: 0.78rem;
}
.about-block .author {
  color: var(--primary);
  font-family: var(--font-mono);
  font-weight: 600;
}

/* ========== TOAST (refresh / error only) ========== */
.toast {
  position: fixed;
  left: 50%;
  bottom: calc(96px + var(--safe-bottom));
  transform: translateX(-50%) translateY(16px);
  background: var(--surface-elevated);
  border: 1px solid var(--border-strong);
  color: var(--text-1);
  padding: 0.6rem 1rem;
  border-radius: 99px;
  font-size: 0.85rem;
  font-weight: 500;
  z-index: 110;
  opacity: 0;
  transition: opacity 0.22s, transform 0.22s;
  pointer-events: none;
  box-shadow: 0 12px 30px rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  max-width: 82vw;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast-icon { color: var(--success); font-weight: 700; }
.toast-icon.error { color: var(--danger); }

/* Tablet+: cap width but keep phone-style layout */
@media (min-width: 600px) {
  body {
    max-width: 480px;
    margin: 0 auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
}
</style>
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="brand-row">
      <div class="logo-mark">
        <img src="logo.png" alt="A3" onerror="this.style.display='none';this.parentNode.innerHTML='<span class=&quot;logo-fallback&quot;>A3</span>';">
      </div>
      <div class="brand-text">
        <h1>A3 Extensions</h1>
        <p>Internal · King Faisal Specialist Hospital</p>
      </div>
      <button class="icon-button" id="settingsBtn" aria-label="Settings">⚙</button>
    </div>
  </header>

  <!-- EMERGENCY RRT -->
  <div class="rrt-bar" role="region" aria-label="Emergency contacts">
    <span class="rrt-pulse" aria-hidden="true"></span>
    <span class="rrt-label">RRT</span>
    <div class="rrt-numbers">
      <a href="tel:49337" class="rrt-call">
        <span class="rrt-call-label">Adult</span>
        <span class="rrt-call-num">49337</span>
      </a>
      <a href="tel:45381" class="rrt-call">
        <span class="rrt-call-label">Peds</span>
        <span class="rrt-call-num">45381</span>
      </a>
    </div>
  </div>

  <!-- SEARCH + FILTERS -->
  <div class="search-wrap">
    <div class="search-field" id="searchWrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <input id="search" type="search" placeholder="Search service, category or extension…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
      <button class="search-clear" id="searchClear" aria-label="Clear search">✕</button>
    </div>
    <div class="filter-row">
      <button class="chip active" id="chipAll">All <span class="chip-count" id="countAll">0</span></button>
      <button class="chip" id="chipFav">★ Favorites <span class="chip-count" id="countFav">0</span></button>
      <select class="sort-select" id="sortSelect" aria-label="Sort by">
        <option value="category">Category</option>
        <option value="service">Service</option>
        <option value="extension">Extension</option>
      </select>
    </div>
  </div>

  <!-- LIST -->
  <main class="list-scroll" id="list" aria-live="polite"></main>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <button class="live-pill" id="livePill" aria-label="Refresh data">
      <span class="live-dot" id="liveDot"></span>
      <span>LIVE</span>
    </button>
    <span class="count-pill" id="footerCount">—</span>
  </div>

  <!-- FAB: Printer sheet -->
  <button class="fab" id="printerFab" aria-label="Open printer info">🖨️</button>

  <!-- SETTINGS POPOVER -->
  <div class="settings-pop" id="settingsPop" role="dialog" aria-label="Settings">
    <h4>Text size</h4>
    <div class="size-row">
      <button id="sizeDown" aria-label="Decrease text size">A−</button>
      <span class="size-val" id="sizeVal">15px</span>
      <button id="sizeUp" aria-label="Increase text size">A+</button>
    </div>
    <div class="about-block">
      <strong>A3 Internal Extensions</strong>
      Personal initiative — not an official hospital system.<br>
      <span class="author">F1520110 · Nawaf Alshammari</span>
    </div>
  </div>

  <!-- BOTTOM SHEET: Printer -->
  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <section class="sheet" id="printerSheet" role="dialog" aria-label="Printers">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">
        <span class="sheet-icon">🖨️</span>
        <span>Printers &amp; Device Info</span>
      </div>
      <button class="sheet-close" id="printerClose" aria-label="Close">✕</button>
    </div>
    <div class="sheet-body" id="printerList"></div>
  </section>

  <!-- TOAST -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* ==========================================================
   A3 Directory — Mobile App Logic
   ========================================================== */

/* ---------- Config ---------- */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby9t71TVzAJyzRDczYYtLh7oIIq9J4jEvyddy7Bc-BAunFMTuYEwerlscLHjfKw0orA/exec";

const KEY_DATA = 'a3m_data_v1';
const KEY_FAV  = 'a3m_fav_v1';
const KEY_SIZE = 'a3m_size_v1';

/* Migrate favorites & cache from previous v4 desktop build */
(function migrate() {
  try {
    if (!localStorage.getItem(KEY_FAV)) {
      const old = localStorage.getItem('a3_fav_v4');
      if (old) localStorage.setItem(KEY_FAV, old);
    }
    if (!localStorage.getItem(KEY_DATA)) {
      const old = localStorage.getItem('a3_data_v4');
      if (old) localStorage.setItem(KEY_DATA, old);
    }
  } catch (e) {}
})();

/* ---------- Printer reference data ---------- */
const printers = [
  { device: 'RINPA0301B', name: 'Label Printer A' },
  { device: 'RNURB0202B', name: 'Label Printer B' },
  { device: 'RNURA0301Z', name: 'Printer (A3)' },
  { device: 'nurse_a3',   name: 'A3 PC Login' },
  { device: 'KFSH#3709',  name: 'PC Password' }
];

/* ---------- State ---------- */
let data = [];
let favorites = new Set();
let currentView = 'all';     // 'all' | 'fav'
let sortBy = 'category';     // 'category' | 'service' | 'extension'
let baseSize = 15;
let queryString = '';

/* ---------- Element refs ---------- */
const $ = (id) => document.getElementById(id);
const listEl     = $('list');
const searchEl   = $('search');
const searchWrap = $('searchWrap');
const chipAll    = $('chipAll');
const chipFav    = $('chipFav');
const countAll   = $('countAll');
const countFav   = $('countFav');
const sortSelect = $('sortSelect');
const liveDot    = $('liveDot');
const livePill   = $('livePill');
const footerCount= $('footerCount');
const settingsPop= $('settingsPop');
const settingsBtn= $('settingsBtn');
const sizeVal    = $('sizeVal');
const toastEl    = $('toast');
const sheetBackdrop = $('sheetBackdrop');
const printerSheet  = $('printerSheet');
const printerList   = $('printerList');

/* ---------- Security utils ---------- */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
function escapeAttr(s) { return escapeHtml(s); }
function escapeRegex(s) {
  return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
function makeKey(r) {
  return (r.category||'') + '|' + (r.service||'') + '|' + (r.extension||'');
}

/* ---------- Toast (refresh/error only) ---------- */
let toastTimer;
function showToast(msg, ok = true) {
  toastEl.innerHTML =
    '<span class="toast-icon' + (ok ? '' : ' error') + '">' + (ok ? '✓' : '✕') + '</span>' +
    '<span>' + escapeHtml(msg) + '</span>';
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1700);
}

/* ---------- Init ---------- */
function init() {
  const s = parseInt(localStorage.getItem(KEY_SIZE), 10);
  if (!isNaN(s) && s >= 13 && s <= 20) baseSize = s;
  applySize();

  try {
    const parsed = JSON.parse(localStorage.getItem(KEY_FAV) || '[]');
    favorites = new Set(Array.isArray(parsed) ? parsed : []);
  } catch (e) { favorites = new Set(); }

  try {
    const cached = JSON.parse(localStorage.getItem(KEY_DATA) || 'null');
    if (Array.isArray(cached) && cached.length) {
      data = cached;
      render();
    } else {
      showSkeleton();
    }
  } catch (e) { showSkeleton(); }

  fetchData();
}

function showSkeleton() {
  let html = '';
  for (let i = 0; i < 6; i++) html += '<div class="skeleton"></div>';
  listEl.innerHTML = html;
}

/* ---------- JSONP fetch ---------- */
let fetchScript;
function fetchData() {
  liveDot.classList.add('syncing');
  if (fetchScript && fetchScript.parentNode) {
    fetchScript.parentNode.removeChild(fetchScript);
  }
  const s = document.createElement('script');
  s.src = APPS_SCRIPT_URL + '?_=' + Date.now();
  s.onerror = () => {
    liveDot.classList.remove('syncing');
    showToast('Couldn\u2019t reach server', false);
  };
  s.onload = () => {
    if (s.parentNode) s.parentNode.removeChild(s);
  };
  fetchScript = s;
  document.body.appendChild(s);
}

window.callback = function(response) {
  liveDot.classList.remove('syncing');
  if (!Array.isArray(response)) return;
  const next = JSON.stringify(response);
  const prev = localStorage.getItem(KEY_DATA);
  if (prev !== next) {
    try { localStorage.setItem(KEY_DATA, next); } catch (e) {}
  }
  data = response;
  render();
};

/* ---------- Render ---------- */
function render() {
  const q = queryString;
  let re = null;
  if (q) {
    try { re = new RegExp('\\b' + escapeRegex(q), 'i'); }
    catch (e) { re = null; }
  }

  countAll.textContent = data.length;
  countFav.textContent = favorites.size;

  let list = data.filter(row => {
    if (currentView === 'fav' && !favorites.has(makeKey(row))) return false;
    if (!q) return true;
    if (!re) return true;
    return re.test(row.category || '') ||
           re.test(row.service  || '') ||
           re.test(String(row.extension || ''));
  });

  list.sort((a, b) => {
    if (sortBy === 'extension') {
      const na = parseInt(a.extension, 10);
      const nb = parseInt(b.extension, 10);
      if (!isNaN(na) && !isNaN(nb)) return na - nb;
    }
    const va = String(a[sortBy] || '').toLowerCase();
    const vb = String(b[sortBy] || '').toLowerCase();
    return va.localeCompare(vb);
  });

  footerCount.textContent = list.length + ' / ' + data.length;

  if (list.length === 0) {
    if (data.length === 0) {
      showSkeleton();
      return;
    }
    const isFavView = currentView === 'fav';
    listEl.innerHTML =
      '<div class="empty-state">' +
        '<div class="ico">' + (isFavView ? '☆' : '🔍') + '</div>' +
        '<h3>' + (isFavView ? 'No favorites yet' : 'No results') + '</h3>' +
        '<p>' + (isFavView
          ? 'Tap the star on any entry to save it here.'
          : 'Try a different word or extension.') +
        '</p>' +
      '</div>';
    return;
  }

  const showGroups = sortBy === 'category' && !q;
  const html = [];
  let lastCat = null;

  for (let i = 0; i < list.length; i++) {
    const row = list[i];
    const cat = row.category || '';
    if (showGroups && cat !== lastCat) {
      html.push('<div class="section-label">' + escapeHtml(cat) + '</div>');
      lastCat = cat;
    }
    const key = makeKey(row);
    const isFav = favorites.has(key);
    const safeCat = escapeHtml(cat);
    const safeSvc = escapeHtml(row.service || '');
    const safeExt = escapeHtml(row.extension || '');
    const safeKey = escapeAttr(key);

    html.push(
      '<div class="card">' +
        '<button class="card-fav' + (isFav ? ' active' : '') + '" data-key="' + safeKey + '" aria-label="Toggle favorite">★</button>' +
        '<div class="card-body">' +
          '<div class="card-service">' + safeSvc + '</div>' +
          (showGroups ? '' : '<span class="card-category">' + safeCat + '</span>') +
        '</div>' +
        '<a class="card-ext" href="tel:' + safeExt + '" aria-label="Call extension ' + safeExt + '">' + safeExt + '</a>' +
      '</div>'
    );
  }

  listEl.innerHTML = html.join('');
}

/* ---------- List interactions ---------- */
listEl.addEventListener('click', (e) => {
  const favBtn = e.target.closest('.card-fav');
  if (favBtn) {
    e.preventDefault();
    const key = favBtn.dataset.key;
    if (favorites.has(key)) favorites.delete(key);
    else favorites.add(key);
    try { localStorage.setItem(KEY_FAV, JSON.stringify([...favorites])); } catch(e){}
    render();
  }
  /* .card-ext is an <a href="tel:..."> — browser handles it natively */
});

/* ---------- Search ---------- */
let searchTimer;
searchEl.addEventListener('input', (e) => {
  queryString = e.target.value.toLowerCase().trim();
  searchWrap.classList.toggle('has-text', queryString.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 50);
});
$('searchClear').addEventListener('click', () => {
  searchEl.value = '';
  queryString = '';
  searchWrap.classList.remove('has-text');
  render();
  searchEl.focus();
});

/* ---------- Filter chips ---------- */
chipAll.addEventListener('click', () => {
  if (currentView === 'all') return;
  currentView = 'all';
  chipAll.classList.add('active');
  chipFav.classList.remove('active');
  render();
});
chipFav.addEventListener('click', () => {
  if (currentView === 'fav') return;
  currentView = 'fav';
  chipFav.classList.add('active');
  chipAll.classList.remove('active');
  render();
});

/* ---------- Sort ---------- */
sortSelect.addEventListener('change', (e) => {
  sortBy = e.target.value;
  render();
});

/* ---------- Settings popover ---------- */
settingsBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  settingsPop.classList.toggle('open');
});
document.addEventListener('click', (e) => {
  if (!settingsPop.contains(e.target) && e.target !== settingsBtn && !settingsBtn.contains(e.target)) {
    settingsPop.classList.remove('open');
  }
});

$('sizeUp').addEventListener('click', () => resize(1));
$('sizeDown').addEventListener('click', () => resize(-1));
function resize(delta) {
  baseSize = Math.max(13, Math.min(20, baseSize + delta));
  applySize();
  try { localStorage.setItem(KEY_SIZE, baseSize); } catch(e){}
}
function applySize() {
  document.documentElement.style.setProperty('--base-size', baseSize + 'px');
  sizeVal.textContent = baseSize + 'px';
}

/* ---------- Live pill: tap to refresh ---------- */
livePill.addEventListener('click', () => {
  if (liveDot.classList.contains('syncing')) return;
  fetchData();
  showToast('Refreshing…');
});

/* ---------- Printer sheet ---------- */
$('printerFab').addEventListener('click', openPrinter);
$('printerClose').addEventListener('click', closePrinter);
sheetBackdrop.addEventListener('click', closePrinter);

function openPrinter() {
  renderPrinters();
  sheetBackdrop.classList.add('open');
  requestAnimationFrame(() => printerSheet.classList.add('open'));
}
function closePrinter() {
  printerSheet.classList.remove('open');
  sheetBackdrop.classList.remove('open');
  printerSheet.style.transform = '';
}

function renderPrinters() {
  if (!printers.length) {
    printerList.innerHTML =
      '<div class="empty-state"><div class="ico">🖨️</div><h3>No printers</h3><p>None defined yet.</p></div>';
    return;
  }
  const html = printers.map(p => {
    const dev  = escapeHtml(p.device || '');
    const name = escapeHtml(p.name || '');
    return (
      '<div class="printer-row">' +
        '<span class="printer-code">' + dev + '</span>' +
        '<div class="printer-name">' + name + '</div>' +
      '</div>'
    );
  }).join('');
  printerList.innerHTML = html;
}

/* ---------- Drag-down to close bottom sheet ---------- */
let touchY0 = 0, touchY1 = 0, dragging = false;
printerSheet.addEventListener('touchstart', (e) => {
  if (e.target.closest('.sheet-body')) return;
  touchY0 = touchY1 = e.touches[0].clientY;
  dragging = true;
  printerSheet.style.transition = 'none';
}, { passive: true });

printerSheet.addEventListener('touchmove', (e) => {
  if (!dragging) return;
  touchY1 = e.touches[0].clientY;
  const dy = Math.max(0, touchY1 - touchY0);
  printerSheet.style.transform = 'translateY(' + dy + 'px)';
}, { passive: true });

printerSheet.addEventListener('touchend', () => {
  if (!dragging) return;
  dragging = false;
  printerSheet.style.transition = '';
  const dy = touchY1 - touchY0;
  if (dy > 90) {
    closePrinter();
  } else {
    printerSheet.style.transform = '';
  }
});

/* ---------- Esc closes overlays (desktop debug) ---------- */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    settingsPop.classList.remove('open');
    if (printerSheet.classList.contains('open')) closePrinter();
  }
});

/* ---------- Kick off ---------- */
init();
</script>
</body>
</html>
